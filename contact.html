<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Contact Me</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" type="image/png" href="Images/SA_logo.png" />
    <style>
        /* Mobile-specific contact form styles */
        @media (max-width: 600px) {
            .contact-flex {
                padding: 15px;
            }
            .owner-prg, .cont-prg {
                padding: 20px;
            }
            textarea {
                min-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="fullPrg">
        <nav>
            <div class="top">
                <h1 class="logo">SA</h1>
                <div class="hidden">
                    <button aria-label="Menu"><i class="bx bx-menu"></i></button>
                </div>
            </div>
            <ul>
                <a href="index.html">home</a>
                <a href="about.html">about</a>
                <a href="education.html">education</a>
                <a href="skills.html">skills</a>
                <a href="projects.html">project</a>
                <a href="internship.html">internship</a>
                <a href="certification.html">certifications</a>
                <a href="resume.html">resume</a>
                <a href="contact.html" class="current">contact</a>
            </ul>
        </nav>

        <!-- Contact Section -->
        <div class="contact">
            <h1 class="title">contact</h1>
            <div class="contact-flex">
                <div class="owner-prg">
                    <div class="name">Sudeep D Ashtekar</div>
                    <p>You can connect with me through any platform below:</p>
                    <div class="icons">
                        <a href="https://wa.me/8217264204" target="_blank" aria-label="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
                        <a href="mailto:ashtekardsudeep@gmail.com" target="_blank" aria-label="Email"><i class="bx bxl-gmail"></i></a>
                        <a href="https://www.linkedin.com/in/sudeep-ashtekar-312166280" target="_blank" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
                        <a href="https://github.com/sudeep-da" target="_blank" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
                    </div>
                </div>

                <div class="cont-prg">
                    <div class="text">Contact Me</div>
                    <form id="contactForm">
                        <div class="up">
                            <input type="text" placeholder="Your Name" required />
                            <input type="email" placeholder="Your Email" required />
                        </div>
                        <textarea placeholder="Your Message" required></textarea>
                        <button type="submit">Submit</button>
                    </form>
                </div>
            </div>
        </div>

        <footer>
            copyright &copy; 2025 | designed by <span>Sudeep</span>
        </footer>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thank you for your message! I will get back to you soon.');
            this.reset();
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
